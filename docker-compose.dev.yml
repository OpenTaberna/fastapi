volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./opentaberna-postgres
  redis_data:
    driver: local
  minio_data:
    driver: local

services:
  opentaberna-api:
    build:
      context: .
      dockerfile: src/Dockerfile
    image: opentaberna-api:latest
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    container_name: opentaberna-api
    depends_on:
      - opentaberna-db
      - opentaberna-redis
      - opentaberna-keycloak
      - opentaberna-minio

  opentaberna-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opentaberna_password}
      POSTGRES_DB: ${POSTGRES_DB:-opentaberna}
      POSTGRES_USER: ${POSTGRES_USER:-opentaberna}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    container_name: opentaberna-db
    ports:
      - "5432:5432"

  opentaberna-redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - ./redis_data:/data
    restart: unless-stopped
    container_name: opentaberna-redis
    ports:
      - "6379:6379"

  opentaberna-keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8080
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    restart: unless-stopped
    container_name: opentaberna-keycloak

  opentaberna-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-opentaberna}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-opentaberna_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Web Console
    restart: unless-stopped
    container_name: opentaberna-minio

  opentaberna-worker:
    build:
      context: .
      dockerfile: src/Dockerfile
    image: opentaberna-api:latest
    command: arq app.worker.WorkerSettings
    env_file: .env
    restart: unless-stopped
    container_name: opentaberna-worker
    depends_on:
      - opentaberna-db
      - opentaberna-redis
      - opentaberna-minio
